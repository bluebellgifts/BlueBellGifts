<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="Bluebell Gifts - Premium Personalized Gift Shop | Best Gifts Online"
    />
    <meta
      name="description"
      content="Shop premium personalized gifts, photo frames, custom decor & unique gift ideas at Bluebell Gifts. ✓ Fast delivery ✓ Quality guaranteed ✓ Perfect for all occasions"
    />
    <meta
      name="keywords"
      content="personalized gifts, custom photo frames, gift shop, online gifts, unique gifts, personalized decor, gift ideas, personalized photo gifts, gift ordering, premium gifts"
    />
    <meta name="author" content="Bluebell Gifts" />
    <meta name="creator" content="Bluebell Gifts" />
    <meta name="publisher" content="Bluebell Gifts" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="language" content="en-US" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://bluebellgifts.in" />

    <title>
      Bluebell Gifts - Premium Personalized Gifts | Unique Gift Ideas Online
    </title>

    <!-- Favicon - ICO Format (Legacy Support) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Favicon - PNG Format (Modern) -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />

    <!-- Apple Touch Icons - All Sizes -->
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png" />
    <link
      rel="apple-touch-icon"
      sizes="114x114"
      href="/apple-icon-114x114.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="/apple-icon-120x120.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="144x144"
      href="/apple-icon-144x144.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/apple-icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-icon-180x180.png"
    />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <link rel="apple-touch-icon" href="/apple-icon-precomposed.png" />

    <!-- Android Icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="144x144"
      href="/android-icon-144x144.png"
    />

    <!-- PWA Manifest & Android Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Bluebell Gifts" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Bluebell Gifts" />

    <!-- Microsoft Windows Support -->
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="background-color" content="#ffffff" />

    <!-- Open Graph / Social Sharing Meta Tags -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Bluebell Gifts - Premium Personalized Gifts Online"
    />
    <meta
      property="og:description"
      content="Discover premium personalized gifts, custom photo frames & unique decor. Fast delivery, quality guaranteed. Shop beautiful gifts for all occasions at Bluebell Gifts."
    />
    <meta property="og:image" content="https://bluebellgifts.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://bluebellgifts.in" />
    <meta property="og:site_name" content="Bluebell Gifts" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bluebellgifts" />
    <meta
      name="twitter:title"
      content="Bluebell Gifts - Premium Personalized Gifts"
    />
    <meta
      name="twitter:description"
      content="Shop premium personalized gifts and unique decor. Fast delivery, quality guaranteed."
    />
    <meta
      name="twitter:image"
      content="https://bluebellgifts.in/twitter-image.png"
    />
    <meta name="twitter:creator" content="@bluebellgifts" />

    <!-- Additional SEO Meta Tags -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />

    <!-- Geo Targeting -->
    <meta name="geo.region" content="IN-TN" />
    <meta name="geo.placename" content="Tamil Nadu, India" />
    <meta name="geo.position" content="11.1271;79.8790" />

    <!-- Performance & Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bluebell Gifts",
        "url": "https://bluebellgifts.in",
        "logo": "https://bluebellgifts.in/logo.png",
        "description": "Premium personalized gifts and custom decor shop",
        "sameAs": [
          "https://www.facebook.com/bluebellgifts",
          "https://www.instagram.com/bluebellgifts",
          "https://www.twitter.com/bluebellgifts"
        ],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "",
          "addressLocality": "Tamil Nadu",
          "addressRegion": "TN",
          "postalCode": "",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "email": "support@bluebellgifts.in",
          "availableLanguage": ["en", "ta"]
        }
      }
    </script>

    <!-- WebSite Schema with Search Action -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://bluebellgifts.in",
        "name": "Bluebell Gifts",
        "description": "Premium personalized gifts and custom decor",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://bluebellgifts.in/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
